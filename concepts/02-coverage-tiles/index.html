<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Astrus · Coverage Tiles</title>
    <link rel="stylesheet" href="../../assets/shell.css" />
    <link rel="stylesheet" href="../../assets/cc.css" />
    <style>
      /* Coverage Tiles — concept-only additions (grid/tile base already in cc.css) */
      .tile-name { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
      .tile-sub-tag {
        font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
        color: #6b5bd0; background: #efeafb; padding: 1px 6px; border-radius: 8px; margin-left: 6px;
      }
      .tile[disabled] { cursor: default; }
      .tile-whole-sub { font-size: 11px; color: var(--sf-text-weaker); font-weight: 500; margin-top: -2px; }
      .tile.on .tile-whole-sub { color: #1a7a3a; }
    </style>
  </head>
  <body>
    <noscript>This interactive concept needs JavaScript.</noscript>
    <script src="../../assets/shell.js"></script>
    <script>
      (function () {
        const state = { moment: 0, scope: ASTRUS.newScope() };
        const _hm = location.hash.match(/m(\d)/);
        if (_hm) state.moment = Number(_hm[1]);
        let CTX;

        function countChip() {
          const n = CTX.selectedCount(state.scope);
          return '<span class="cc-count' + (n === 0 ? " none" : "") + '">' + n + " of " + CTX.data.lines.length + " lines</span>";
        }
        function runSummaryHTML() {
          const r = CTX.computeRunSummary(state.scope);
          const empty = !CTX.hasSelection(state.scope);
          const icon = { docs: "📄", populate: "✓", lock: "🔒", protect: "🔒" };
          const lines = r.lines.map((l) => '<div class="run-line run-line--' + l.kind + '"><span class="rl-ic">' + (icon[l.kind] || "•") + "</span><span>" + CTX.esc(l.text) + "</span></div>").join("");
          return '<div class="run-summary' + (empty ? " is-empty" : "") + '">' + (empty ? '<p class="cc-hint" style="margin:0">Tap a tile to preview.</p>' : lines) + "</div>";
        }

        function render() {
          const mount = document.getElementById("cc-body");
          mount.innerHTML = "";
          mount.appendChild(CTX.momentStepper(state.moment, go));
          const box = document.createElement("div");
          if (state.moment === 0) box.innerHTML = CTX.bannerHTML() + mUpload();
          else if (state.moment === 1) box.innerHTML = mReview();
          else if (state.moment === 2) box.innerHTML = mLines();
          else box.innerHTML = mFinal();
          mount.appendChild(box);
          bind(box);
          if (state.moment === 0) CTX.bindUploadStep(box, state.scope, render);
        }

        function mUpload() {
          return CTX.renderUploadStep(state.scope) +
            '<div class="cc-actions"><span class="spacer"></span><button class="slds-btn slds-btn--brand" data-go="1">Next: review →</button></div>';
        }
        function mReview() {
          return '<p class="cc-section-title">Review attachments</p>' + CTX.renderReview(state.scope) +
            '<div class="cc-actions"><button class="slds-btn" data-go="0">← Upload</button><span class="spacer"></span><button class="slds-btn slds-btn--brand" data-go="2">Next: lines →</button></div>';
        }

        /* ---- LINES step: 2-col tile grid (our paradigm) --------------- */
        function wholeTile() {
          const on = state.scope.whole;
          return (
            '<button type="button" class="tile wide' + (on ? " on" : "") + '" data-tile="whole" aria-pressed="' + on + '">' +
            '<div class="tile-name"><span>Entire submission</span><span class="tile-check' + (on ? " on" : "") + '">' + (on ? "✓" : "") + "</span></div>" +
            '<div class="tile-state">' + (on ? "Will " + CTX.verb.toLowerCase() : "All " + CTX.data.lines.length + " lines") + "</div>" +
            '<div class="tile-whole-sub">' + (on ? "Every line below is included" : "Tap to select all lines at once") + "</div>" +
            "</button>"
          );
        }
        function lineTile(l) {
          const forced = state.scope.whole;
          const on = forced || state.scope.lob.has(l.id);
          const tag = l.kind === "sub" ? '<span class="tile-sub-tag">Submission-level</span>' : "";
          return (
            '<button type="button" class="tile' + (on ? " on" : "") + '" data-tile="' + l.id + '"' + (forced ? " disabled" : "") + ' aria-pressed="' + on + '">' +
            '<div class="tile-name"><span>' + CTX.esc(l.label) + tag + '</span><span class="tile-check' + (on ? " on" : "") + '">' + (on ? "✓" : "") + "</span></div>" +
            '<div class="tile-state">' + (on ? "Will " + CTX.verb.toLowerCase() : CTX.offLabel) + "</div>" +
            "</button>"
          );
        }
        function mLines() {
          const tiles = CTX.data.lines.map(lineTile).join("");
          return (
            '<div class="cc-title-row"><p class="cc-section-title">Choose what to ' + CTX.verb.toLowerCase() + "</p>" + countChip() + "</div>" +
            '<div class="tile-grid">' + wholeTile() + tiles + "</div>" +
            runSummaryHTML() +
            '<div class="cc-actions"><button class="slds-btn" data-go="1">← Review</button><span class="spacer"></span><button class="slds-btn slds-btn--brand" data-go="3">Next →</button></div>'
          );
        }

        function mFinal() {
          return (
            '<div class="cc-title-row"><p class="cc-section-title">' + CTX.finalLabel + "</p>" + countChip() + "</div>" +
            runSummaryHTML() +
            '<div class="cc-actions"><button class="slds-btn" data-go="2">← Lines</button><span class="spacer"></span>' +
            '<button class="slds-btn slds-btn--brand" data-run ' + (!CTX.hasSelection(state.scope) ? "disabled" : "") + ">" + CTX.finalLabel + " →</button></div>"
          );
        }

        function go(i) { state.moment = i; history.replaceState(null, "", "#m" + i); render(); }

        function bind(box) {
          box.querySelectorAll("[data-go]").forEach((b) => (b.onclick = () => go(Number(b.dataset.go))));
          box.querySelectorAll(".doc-toggle").forEach((b) => (b.onclick = () => { const n = b.dataset.doc; state.scope.excludedDocs.has(n) ? state.scope.excludedDocs.delete(n) : state.scope.excludedDocs.add(n); render(); }));
          box.querySelectorAll("[data-tile]").forEach((b) => {
            b.onclick = () => {
              const id = b.dataset.tile;
              if (id === "whole") { state.scope.whole = !state.scope.whole; render(); return; }
              if (state.scope.whole) return;
              state.scope.lob.has(id) ? state.scope.lob.delete(id) : state.scope.lob.add(id);
              render();
            };
          });
          const rp = box.querySelector("[data-run]");
          if (rp) rp.onclick = async () => { const ok = await CTX.runProcess(state.scope); if (ok) { state.scope = ASTRUS.newScope(); go(0); } };
        }

        window.CONCEPT = { name: "Coverage Tiles", render: function (mount, ctx) { CTX = ctx; render(); } };
        ASTRUS.boot(window.CONCEPT);
      })();
    </script>
  </body>
</html>
