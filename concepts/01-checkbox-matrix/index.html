<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Astrus Reprocess · Checklist</title>
    <link rel="stylesheet" href="../../assets/shell.css" />
    <link rel="stylesheet" href="../../assets/cc.css" />
    <style>
      /* Concept 01 — Checklist: the RFC flow, LOB-only, at realistic card width */
      .ck-check {
        width: 20px;
        height: 20px;
        border-radius: 4px;
        border: 2px solid var(--sf-border-strong);
        background: #fff;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 13px;
        font-weight: 700;
        flex: none;
        padding: 0;
        transition: all 0.12s ease;
      }
      .ck-check.on {
        background: var(--sf-brand);
        border-color: var(--sf-brand);
      }
      .ck-check:hover {
        border-color: var(--sf-brand);
      }
      .lock-ic {
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <noscript>This interactive concept needs JavaScript.</noscript>
    <script src="../../assets/shell.js"></script>
    <script>
      (function () {
        const state = { moment: 0, scope: ASTRUS.newScope() };
        const _hm = location.hash.match(/m(\d)/);
        if (_hm) state.moment = Number(_hm[1]);
        let CTX;

        function badge() {
          const m = document.querySelector(".cc-badge-mount");
          if (m) m.innerHTML = '<span class="slds-badge badge-warning">Requires Review</span>';
        }

        function statusStrip() {
          const e = CTX.data.engine;
          return (
            '<dl class="cc-status">' +
            '<dt>Status</dt><dd><span class="slds-badge badge-warning">' + e.status + "</span></dd>" +
            "<dt>Stage</dt><dd>" + e.stage + "</dd>" +
            "<dt>Files</dt><dd>Preprocessed: " + e.filesPrep + " | Extracted: " + e.filesExt + "</dd>" +
            "<dt>Completed</dt><dd>" + e.completed + "</dd>" +
            "</dl>"
          );
        }

        function runSummaryHTML() {
          const r = CTX.computeRunSummary(state.scope);
          const empty = !CTX.data ? true : !state.scope.whole && state.scope.lob.size === 0;
          const icon = { docs: "📄", update: "↻", lock: "🔒", safe: "✓", protect: "🔒" };
          const lines = r.lines
            .map(
              (l) =>
                '<div class="run-line run-line--' + l.kind + '"><span class="rl-ic">' +
                (icon[l.kind] || "•") + "</span><span>" + CTX.esc(l.text) + "</span></div>"
            )
            .join("");
          const title = state.scope.whole
            ? "✓ What this run will do — entire submission"
            : empty
            ? "Nothing selected yet"
            : "✓ What this run will do — " + r.selectedCount + " of " + r.total + " lines";
          return (
            '<div class="run-summary' + (empty ? " is-empty" : "") + '">' +
            '<p class="run-summary-title">' + title + "</p>" +
            (empty
              ? '<p class="cc-hint" style="margin:0">No lines chosen. Pick a line below (or choose the entire submission) to see exactly what a reprocess would do.</p>'
              : lines) +
            "</div>"
          );
        }

        function render() {
          badge();
          const mount = document.getElementById("cc-body");
          mount.innerHTML = statusStrip();
          mount.appendChild(CTX.momentStepper(state.moment, go));
          const box = document.createElement("div");
          if (state.moment === 0) box.innerHTML = momentArrival();
          else if (state.moment === 1) box.innerHTML = momentFiles();
          else if (state.moment === 2) box.innerHTML = momentScope();
          else box.innerHTML = momentRun();
          mount.appendChild(box);
          bind(box);
        }

        function momentArrival() {
          return (
            CTX.bellAlertHTML() +
            '<div class="cc-actions"><button class="slds-btn slds-btn--brand" data-go="1">Review the files →</button></div>' +
            '<p class="cc-hint">A follow-up used to silently re-run the engine and overwrite your work. Now it just rings this bell — you decide what happens next.</p>'
          );
        }

        function momentFiles() {
          return (
            '<p class="cc-section-title">Review the documents</p>' +
            '<p class="cc-section-sub">Everything is included by default. Turn off anything the reprocess should ignore — like last year\'s vehicle schedule now that a revised one arrived.</p>' +
            CTX.renderFiles(state.scope) +
            '<div class="cc-actions"><button class="slds-btn" data-go="0">← Back</button><span class="spacer"></span>' +
            '<button class="slds-btn slds-btn--brand" data-go="2">Next: choose lines →</button></div>'
          );
        }

        function lineRow(l) {
          if (state.scope.whole) {
            return (
              '<div class="line-row forced"><span class="line-name">' + CTX.esc(l.label) +
              '</span><span class="line-state">Will run ✓</span></div>'
            );
          }
          const on = state.scope.lob.has(l.id);
          return (
            '<div class="line-row ' + (on ? "on" : "locked") + '">' +
            '<button class="ck-check' + (on ? " on" : "") + '" data-line="' + l.id +
            '" aria-pressed="' + on + '" aria-label="Update ' + CTX.esc(l.label) + '">' + (on ? "✓" : "") + "</button>" +
            '<span class="line-name">' + CTX.esc(l.label) + "</span>" +
            '<span class="line-state">' + (on ? "Will run" : '<span class="lock-ic">🔒</span> Locked') + "</span>" +
            "</div>"
          );
        }

        function momentScope() {
          const rows = CTX.data.lobs.map(lineRow).join("");
          return (
            '<p class="cc-section-title">Choose what this reprocess may update</p>' +
            '<p class="cc-section-sub">All lines off by default. A reprocess re-reads your included documents and re-runs only the lines you turn on — everything else stays locked.</p>' +
            '<div class="cc-mode">' +
            '<div class="cc-mode-opt' + (!state.scope.whole ? " on" : "") + '" data-mode="selected"><span class="cc-mode-radio"></span><div><div class="cc-mode-title">Only the lines I choose</div><div class="cc-mode-desc">Turn on individual lines below; the rest stay locked.</div></div></div>' +
            '<div class="cc-mode-opt' + (state.scope.whole ? " on" : "") + '" data-mode="whole"><span class="cc-mode-radio"></span><div><div class="cc-mode-title">Reprocess the entire submission</div><div class="cc-mode-desc">Re-run all ' + CTX.data.lobs.length + ' lines from the included documents.</div></div></div>' +
            "</div>" +
            '<div class="line-list">' + rows + "</div>" +
            runSummaryHTML() +
            '<div class="cc-actions"><button class="slds-btn" data-go="1">← Back to files</button><span class="spacer"></span>' +
            '<button class="slds-btn slds-btn--brand" data-go="3">Review &amp; reprocess →</button></div>'
          );
        }

        function momentRun() {
          return (
            '<p class="cc-section-title">Ready to reprocess</p>' +
            runSummaryHTML() +
            '<div class="cc-alert cc-alert--lock" style="margin-top:14px"><div class="cc-alert-ic">🔒</div><div><strong>' +
            CTX.esc(CTX.data.protectedField) + "</strong> is never overwritten by a reprocess, and no submission-level fields are pushed. Astrus fills premium once as an early estimate; after that it's yours.</div></div>" +
            '<div class="cc-actions">' +
            '<button class="slds-btn slds-btn--brand" data-reprocess ' + (!CTX.hasSelectionState() ? "disabled" : "") + ">Reprocess</button>" +
            '<button class="slds-btn" data-processnew>Process as New</button>' +
            '<span class="spacer"></span><button class="slds-btn" data-go="2">← Adjust</button></div>' +
            '<p class="cc-hint"><strong>Reprocess</strong> runs against the scope above. <strong>Process as New</strong> ignores scope and rebuilds a brand-new submission from scratch.</p>'
          );
        }

        function go(i) {
          state.moment = i;
          history.replaceState(null, "", "#m" + i);
          render();
        }

        function bind(box) {
          box.querySelectorAll("[data-go]").forEach((b) => (b.onclick = () => go(Number(b.dataset.go))));
          box.querySelectorAll(".doc-toggle").forEach((b) => {
            b.onclick = () => {
              const n = b.dataset.doc;
              state.scope.excludedDocs.has(n) ? state.scope.excludedDocs.delete(n) : state.scope.excludedDocs.add(n);
              render();
            };
          });
          box.querySelectorAll("[data-mode]").forEach((b) => {
            b.onclick = () => {
              state.scope.whole = b.dataset.mode === "whole";
              render();
            };
          });
          box.querySelectorAll("[data-line]").forEach((b) => {
            b.onclick = () => {
              const id = b.dataset.line;
              state.scope.lob.has(id) ? state.scope.lob.delete(id) : state.scope.lob.add(id);
              render();
            };
          });
          const rp = box.querySelector("[data-reprocess]");
          if (rp)
            rp.onclick = async () => {
              const ok = await CTX.runReprocess(state.scope);
              if (ok) {
                state.scope = ASTRUS.newScope();
                go(0);
              }
            };
          const pn = box.querySelector("[data-processnew]");
          if (pn)
            pn.onclick = async () => {
              const ok = await CTX.confirmModal({
                title: "Process as a new submission?",
                body: "<p>This ignores your scope and rebuilds <strong>everything</strong> as a fresh, potentially duplicate submission. Use it only for a genuinely new deal.</p>",
                confirmLabel: "Process as New",
                destructive: true
              });
              if (ok) CTX.toast("success", "Process as New initiated", "A new submission has been sent to the AI engine.");
            };
        }

        window.CONCEPT = {
          name: "Checklist",
          render: function (mount, ctx) {
            CTX = ctx;
            CTX.hasSelectionState = () => state.scope.whole || state.scope.lob.size > 0;
            render();
          }
        };
        ASTRUS.boot(window.CONCEPT);
      })();
    </script>
  </body>
</html>
