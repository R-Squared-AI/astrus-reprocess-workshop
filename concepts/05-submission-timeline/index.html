<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Astrus Reprocess · Submission Timeline</title>
    <link rel="stylesheet" href="../../assets/shell.css" />
    <link rel="stylesheet" href="../../assets/cc.css" />
    <style>
      /* ---- Concept 05: Submission Timeline (Round 2) ----
         Vertical audit trail: rail + node dots, done(green)/attention(amber)/
         active(blue). NOW is always the LAST, active node — the one place the
         underwriter's control lives. No extraction has happened; nodes state
         only neutral, true facts. */
      .tl-intro { font-size: 12px; color: var(--sf-text-weaker); margin: 0 0 16px; line-height: 1.5; }
      .tl-list { position: relative; list-style: none; margin: 0; padding: 0; }
      .tl-item { position: relative; padding-left: 34px; padding-bottom: 16px; }
      .tl-item:last-child { padding-bottom: 0; }
      .tl-item:not(:last-child)::after {
        content: ""; position: absolute; left: 12px; top: 26px; bottom: -2px; width: 2px; background: #dcdfe5;
      }
      .tl-item--done:not(:last-child)::after { background: var(--sf-success-border); }
      .tl-dot {
        position: absolute; left: 1px; top: 1px; width: 22px; height: 22px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700;
        color: #fff; background: #9a9fa8; box-shadow: 0 0 0 3px #fff; z-index: 1; flex: none;
      }
      .tl-item--done .tl-dot { background: var(--sf-success); }
      .tl-item--attention .tl-dot { background: var(--sf-warn); }
      .tl-item--active .tl-dot { background: var(--sf-brand); box-shadow: 0 0 0 3px #fff, 0 0 0 6px #d8eafd; }
      .tl-content { border: 1px solid var(--sf-border); border-radius: var(--sf-radius); background: #fff; padding: 10px 12px 12px; }
      .tl-item--done .tl-content { background: #fafffc; border-color: #e3f3e7; }
      .tl-item--attention .tl-content { background: var(--sf-warn-bg); border-color: var(--sf-warn-border); }
      .tl-item--active .tl-content { background: #f5f9ff; border-color: var(--sf-brand); box-shadow: 0 0 0 1px var(--sf-brand) inset; }
      .tl-title { display: flex; align-items: baseline; gap: 8px; font-weight: 700; font-size: 13px; color: var(--sf-text); margin: 0 0 3px; line-height: 1.3; }
      .tl-when { margin-left: auto; font-weight: 400; font-size: 10.5px; color: var(--sf-text-weaker); white-space: nowrap; flex: none; }
      .tl-desc { font-size: 12px; color: var(--sf-text-weak); line-height: 1.55; margin: 0; }
      .tl-desc strong { color: var(--sf-text); }
      .tl-lobtags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
      .tl-lobtag {
        font-size: 10.5px; font-weight: 600; color: var(--sf-success); background: var(--sf-success-bg);
        border: 1px solid var(--sf-success-border); border-radius: 10px; padding: 2px 8px;
      }

      /* follow-up node: doc-picker expand affordance */
      .tl-filestoggle {
        display: inline-flex; align-items: center; gap: 5px; margin-top: 9px; font-size: 11.5px; font-weight: 600;
        color: var(--sf-brand-dark); background: none; border: none; padding: 0; cursor: pointer; font-family: inherit;
      }
      .tl-filestoggle .car { font-size: 9px; transition: transform 0.12s ease; }
      .tl-filestoggle.is-open .car { transform: rotate(90deg); }
      .tl-filespanel { margin-top: 10px; }

      /* NOW node — the control */
      .now-lead { font-size: 12px; color: var(--sf-text-weak); margin: 2px 0 12px; line-height: 1.5; }
      .now-summary {
        font-size: 12px; font-weight: 600; color: var(--sf-text); background: #eef4fb; border: 1px solid #c9def5;
        border-radius: var(--sf-radius); padding: 8px 11px; margin-top: 12px; line-height: 1.5;
      }
      .now-summary.is-empty { background: #f7f8fa; border-color: var(--sf-border-strong); color: var(--sf-text-weaker); font-weight: 400; }
      .now-summary .lockic { color: #7a5bd6; }
      .now-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
      .now-actions .spacer { flex: 1; }
    </style>
  </head>
  <body>
    <noscript>This interactive concept needs JavaScript.</noscript>
    <script src="../../assets/shell.js"></script>
    <script>
      (function () {
        let CTX;
        let tickMinutes = 31; // fabricated clock for reprocessed nodes, after engine.completed (4:22:32 PM)
        const state = {
          scope: null, // ctx.newScope() once CTX is available
          filesOpen: false,
          history: [] // completed reprocess events, rendered between the follow-up and NOW
        };

        function nextTimestamp() {
          const t = "Jul 13, 2026 · 4:" + (tickMinutes < 10 ? "0" : "") + tickMinutes + " PM";
          tickMinutes += 4;
          return t;
        }

        function badge() {
          const m = document.querySelector(".cc-badge-mount");
          if (m) m.innerHTML = '<span class="slds-badge badge-warning">Requires Review</span>';
        }

        function statusStrip() {
          const e = CTX.data.engine;
          return (
            '<dl class="cc-status"><dt>Status</dt><dd><span class="slds-badge badge-warning">' + e.status + "</span></dd>" +
            "<dt>Stage</dt><dd>" + e.stage + "</dd>" +
            "<dt>Files</dt><dd>Preprocessed: " + e.filesPrep + " | Extracted: " + e.filesExt + "</dd>" +
            "<dt>Completed</dt><dd>" + e.completed + "</dd></dl>"
          );
        }

        /* ---- generic timeline-node renderer ---- */
        function tlItem(cls, dot, title, when, bodyHTML) {
          return (
            '<li class="tl-item tl-item--' + cls + '"><span class="tl-dot">' + dot +
            '</span><div class="tl-content"><div class="tl-title"><span>' + title +
            '</span><span class="tl-when">' + CTX.esc(when) + "</span></div>" + bodyHTML + "</div></li>"
          );
        }

        /* ---- node 1: received & processed (done) ---- */
        function nodeReceived() {
          const tags = CTX.data.lobs
            .map(function (l) { return '<span class="tl-lobtag">✓ ' + CTX.esc(l.label) + "</span>"; })
            .join("");
          return tlItem(
            "done", "✓", "Submission received &amp; processed", CTX.data.messageDate,
            '<p class="tl-desc">The AI engine processed every file on <strong>' + CTX.esc(CTX.data.com) +
              "</strong> and built out all " + CTX.data.lobs.length +
              ' lines of business from a standing start.</p><div class="tl-lobtags">' + tags + "</div>"
          );
        }

        /* ---- node 2: underwriter reviewed (done) — generic, no extracted values ---- */
        function nodeReviewed() {
          return tlItem(
            "done", "✓", "Underwriter reviewed", "Prior to follow-up",
            '<p class="tl-desc"><strong>' + CTX.esc(CTX.data.underwriter) +
              "</strong> reviewed the submission in Salesforce, including a correction to an Indiana WC class code. " +
              "Nothing moved on this submission after that without her say-so.</p>"
          );
        }

        /* ---- node 3: follow-up email (attention) — expandable doc picker ---- */
        function nodeFollowup() {
          const f = CTX.data.followup;
          const total = CTX.data.files.length;
          const panel = state.filesOpen ? '<div class="tl-filespanel">' + CTX.renderFiles(state.scope) + "</div>" : "";
          return tlItem(
            "attention", "🔔", "Follow-up email — new document linked; nothing reprocessed automatically", f.when,
            '<p class="tl-desc">A follow-up email arrived with a new document (<strong>' + CTX.esc(f.file) +
              "</strong>) linked to this Communication. <strong>Nothing was reprocessed automatically</strong> — the review above is untouched.</p>" +
              '<button class="tl-filestoggle' + (state.filesOpen ? " is-open" : "") + '" data-toggle-files aria-expanded="' + state.filesOpen +
              '"><span class="car">▶</span>' + total + " document" + (total === 1 ? "" : "s") + " on this Communication · review</button>" +
              panel
          );
        }

        /* ---- node 4 (always last): NOW — you decide (active, holds the control) ---- */
        function lineRow(l) {
          if (state.scope.whole) {
            return '<div class="line-row forced"><span class="line-name">' + CTX.esc(l.label) + '</span><span class="line-state">Will run ✓</span></div>';
          }
          const on = state.scope.lob.has(l.id);
          return (
            '<div class="line-row ' + (on ? "on" : "locked") + '"><button class="sw' + (on ? " on" : "") +
            '" data-lob="' + l.id + '" role="switch" aria-checked="' + on + '" aria-label="Update ' + CTX.esc(l.label) +
            '"></button><span class="line-name">' + CTX.esc(l.label) + '</span><span class="line-state">' +
            (on ? "Will run" : '<span class="lockic">🔒</span> Locked') + "</span></div>"
          );
        }

        function nowSummaryHTML() {
          const scope = state.scope;
          if (!CTX.hasSelection(scope)) {
            return '<div class="now-summary is-empty">Nothing selected yet — turn on a line above, or choose to reprocess the entire submission.</div>';
          }
          const r = CTX.computeRunSummary(scope);
          const totalDocs = CTX.data.files.length;
          const scopeText = r.whole
            ? "the entire submission (" + r.total + " lines)"
            : r.selectedCount + " of " + r.total + " line" + (r.total === 1 ? "" : "s");
          return (
            '<div class="now-summary">Re-reads ' + r.includedDocs + " of " + totalDocs + " documents · updates " + scopeText +
            ' · <span class="lockic">🔒</span> ' + CTX.esc(CTX.data.protectedField) + " protected.</div>"
          );
        }

        function nodeNow() {
          const scope = state.scope;
          const rows = CTX.data.lobs.map(lineRow).join("");
          const disabled = !CTX.hasSelection(scope);
          return tlItem(
            "active", "●", "NOW — you decide", "Today",
            '<p class="now-lead">Nothing moves until you choose what a reprocess may touch. Everything else on this submission stays exactly as you left it.</p>' +
              '<div class="cc-mode"><div class="cc-mode-opt' + (!scope.whole ? " on" : "") +
              '" data-mode="selected"><span class="cc-mode-radio"></span><div><div class="cc-mode-title">Only the lines I choose</div>' +
              '<div class="cc-mode-desc">Turn on individual lines below; the rest stay locked.</div></div></div>' +
              '<div class="cc-mode-opt' + (scope.whole ? " on" : "") +
              '" data-mode="whole"><span class="cc-mode-radio"></span><div><div class="cc-mode-title">Reprocess the entire submission</div>' +
              '<div class="cc-mode-desc">Re-run all ' + CTX.data.lobs.length + ' lines from the included documents.</div></div></div></div>' +
              '<div class="line-list">' + rows + "</div>" +
              nowSummaryHTML() +
              '<div class="now-actions"><button class="slds-btn slds-btn--brand" data-reprocess ' + (disabled ? "disabled" : "") + ">Reprocess</button>" +
              '<button class="slds-btn" data-processnew>Process as New</button><span class="spacer"></span></div>' +
              '<p class="cc-hint">Reprocess re-reads the included documents and re-runs only the lines above. Process as New ignores scope and rebuilds everything.</p>'
          );
        }

        /* ---- appended node: a completed reprocess (done) ---- */
        function nodeCompleted(h) {
          return tlItem("done", "✓", h.title, h.when, '<p class="tl-desc">' + h.desc + "</p>");
        }

        function timelineHTML() {
          let out = '<ul class="tl-list">' + nodeReceived() + nodeReviewed() + nodeFollowup();
          state.history.forEach(function (h) { out += nodeCompleted(h); });
          out += nodeNow() + "</ul>";
          return out;
        }

        function render() {
          badge();
          const mount = document.getElementById("cc-body");
          mount.innerHTML =
            statusStrip() +
            '<p class="tl-intro">Every step this submission has taken, and who made it happen. The engine never moves again on its own — the control lives at the point marked <strong>NOW</strong>.</p>' +
            timelineHTML();
          bind(mount);
        }

        function bind(mount) {
          const ft = mount.querySelector("[data-toggle-files]");
          if (ft) ft.onclick = function () { state.filesOpen = !state.filesOpen; render(); };

          mount.querySelectorAll(".doc-toggle").forEach(function (b) {
            b.onclick = function () {
              const n = b.dataset.doc;
              state.scope.excludedDocs.has(n) ? state.scope.excludedDocs.delete(n) : state.scope.excludedDocs.add(n);
              render();
            };
          });

          mount.querySelectorAll("[data-mode]").forEach(function (b) {
            b.onclick = function () { state.scope.whole = b.dataset.mode === "whole"; render(); };
          });

          mount.querySelectorAll("[data-lob]").forEach(function (b) {
            b.onclick = function () {
              const id = b.dataset.lob;
              state.scope.lob.has(id) ? state.scope.lob.delete(id) : state.scope.lob.add(id);
              render();
            };
          });

          const rp = mount.querySelector("[data-reprocess]");
          if (rp)
            rp.onclick = async function () {
              const wasWhole = state.scope.whole;
              const chosen = CTX.effectiveLobs(state.scope);
              const inCount = CTX.includedDocs(state.scope).length;
              const ok = await CTX.runReprocess(state.scope);
              if (!ok) return;
              const labelStr = wasWhole ? "the entire submission" : chosen.map(function (l) { return l.label; }).join(", ");
              state.history.push({
                title: "Reprocessed: " + labelStr + " — re-run from the included documents",
                when: nextTimestamp(),
                desc:
                  "The AI engine re-read the " + inCount + " included document" + (inCount === 1 ? "" : "s") +
                  " and re-ran " + (wasWhole ? "every line" : "only " + labelStr) + ". Everything else was left exactly as it was."
              });
              state.scope = ASTRUS.newScope();
              state.filesOpen = false;
              render();
            };

          const pn = mount.querySelector("[data-processnew]");
          if (pn)
            pn.onclick = async function () {
              const ok = await CTX.confirmModal({
                title: "Process as a new submission?",
                body: "<p>This ignores your scope selections and rebuilds <strong>everything</strong> from the current files — a fresh, potentially duplicate submission. Use this only for a genuinely new deal.</p>",
                confirmLabel: "Process as New",
                destructive: true
              });
              if (ok) CTX.toast("success", "Process as New initiated", "A new submission has been sent to the AI engine.");
            };
        }

        window.CONCEPT = {
          name: "Submission Timeline",
          render: function (mount, ctx) {
            CTX = ctx;
            state.scope = ctx.newScope();
            render();
          }
        };
        ASTRUS.boot(window.CONCEPT);
      })();
    </script>
  </body>
</html>
