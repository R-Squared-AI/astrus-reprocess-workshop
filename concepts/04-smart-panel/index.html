<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Astrus Reprocess · Smart Panel</title>
    <link rel="stylesheet" href="../../assets/shell.css" />
    <link rel="stylesheet" href="../../assets/cc.css" />
    <style>
      /* ---- Concept 04: Smart Panel — one calm decision surface, no gate ---- */

      /* slim one-line follow-up banner at the very top of the card */
      .sp-banner {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12.5px;
        color: var(--sf-text-weak);
        background: var(--sf-warn-bg);
        border: 1px solid var(--sf-warn-border);
        border-left: 3px solid var(--sf-warn);
        border-radius: var(--sf-radius);
        padding: 7px 12px;
        margin-bottom: 12px;
        line-height: 1.4;
      }
      .sp-banner .bell {
        font-size: 13px;
        flex: none;
      }

      /* documents one-liner */
      .sp-docsline {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 12.5px;
        color: var(--sf-text-weak);
        padding: 9px 12px;
        background: #f7f9fc;
        border: 1px solid #eef0f2;
        border-radius: var(--sf-radius);
        margin-bottom: 12px;
      }
      .sp-docsline strong {
        color: var(--sf-text);
      }
      .sp-docs-toggle {
        margin-left: auto;
        background: none;
        border: none;
        color: var(--sf-brand);
        font-weight: 700;
        font-size: 12.5px;
        cursor: pointer;
        padding: 2px 4px;
        font-family: inherit;
        flex: none;
      }
      .sp-docs-toggle:hover {
        text-decoration: underline;
      }
      .sp-docs-wrap {
        margin: -3px 0 14px;
      }

      /* scope chips */
      .sp-scope-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--sf-text-weaker);
        font-weight: 700;
        margin: 0 0 8px;
      }
      .sp-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
      }
      .sp-chip {
        font-size: 13px;
        padding: 7px 14px;
      }
      .sp-chip.on {
        box-shadow: 0 0 0 1px var(--sf-brand) inset;
        font-weight: 700;
      }
      .sp-chip--dim {
        opacity: 0.55;
      }
      .sp-chip--whole {
        font-weight: 700;
      }
      .sp-arr {
        font-weight: 700;
        color: var(--sf-brand);
        margin-left: 2px;
      }

      /* the one live sentence */
      .sp-sentence-box {
        border: 1px solid var(--sf-border);
        border-radius: var(--sf-radius);
        background: #fbfcfe;
        padding: 12px 14px;
        margin: 4px 0 16px;
      }
      .sp-sentence-box.is-set {
        border-color: var(--sf-success-border);
        background: var(--sf-success-bg);
      }
      .sp-sentence {
        margin: 0 0 6px;
        font-size: 13px;
        line-height: 1.5;
        color: var(--sf-text);
      }
      .sp-protect-line {
        margin: 0;
        font-size: 11.5px;
        color: #5a3fa0;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      /* action row */
      .sp-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .sp-secondary {
        background: none;
        border: none;
        color: var(--sf-text-weaker);
        font-weight: 600;
        font-size: 12.5px;
        cursor: pointer;
        font-family: inherit;
        padding: 6px 4px;
      }
      .sp-secondary:hover {
        color: var(--sf-text-weak);
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <noscript>This interactive concept needs JavaScript.</noscript>
    <script src="../../assets/shell.js"></script>
    <script>
      (function () {
        const state = { docsOpen: false, scope: null };
        let CTX;

        function badge() {
          const m = document.querySelector(".cc-badge-mount");
          if (m) m.innerHTML = '<span class="slds-badge badge-warning">Requires Review</span>';
        }

        /* ---- slim inline follow-up banner (not a gate screen) ---- */
        function bannerHTML() {
          return (
            '<div class="sp-banner"><span class="bell">🔔</span>' +
            "<span>Follow-up received — a new document was linked. Nothing was reprocessed automatically.</span></div>"
          );
        }

        /* ---- documents one-liner, expands to ctx.renderFiles inline ---- */
        function docsLineHTML() {
          const total = CTX.data.files.length;
          const newCount = CTX.data.files.filter((f) => f.isNew).length;
          const oldCount = total - newCount;
          const inCount = CTX.includedDocs(state.scope).length;
          const allIn = inCount === total;
          return (
            '<div class="sp-docsline"><strong>' +
            total +
            " document" +
            (total === 1 ? "" : "s") +
            "</strong>&nbsp;· " +
            newCount +
            " new, " +
            oldCount +
            " already processed · " +
            (allIn ? "all included" : inCount + " of " + total + " included") +
            '<button class="sp-docs-toggle" data-toggle-docs>' +
            (state.docsOpen ? "Hide documents" : "Review documents") +
            "</button></div>" +
            (state.docsOpen
              ? '<div class="sp-docs-wrap">' + CTX.renderFiles(state.scope) + "</div>"
              : "")
          );
        }

        /* ---- scope as chips: entire submission first, then each LOB ---- */
        function scopeHTML() {
          const scope = state.scope;
          const wholeChip =
            '<button class="chip sp-chip sp-chip--whole' +
            (scope.whole ? " on" : "") +
            '" data-whole="1" aria-pressed="' +
            scope.whole +
            '">Entire submission' +
            (scope.whole ? ' <span class="sp-arr">↻</span>' : "") +
            "</button>";
          const lobChips = CTX.data.lobs
            .map(function (l) {
              const on = !scope.whole && scope.lob.has(l.id);
              return (
                '<button class="chip sp-chip' +
                (on ? " on" : "") +
                (scope.whole ? " sp-chip--dim" : "") +
                '" data-lob="' +
                l.id +
                '" aria-pressed="' +
                on +
                '">' +
                CTX.esc(l.label) +
                (on ? ' <span class="sp-arr">↻</span>' : "") +
                "</button>"
              );
            })
            .join("");
          return (
            '<p class="sp-scope-title">Scope — tap a line, or reprocess the entire submission</p>' +
            '<div class="sp-chips">' +
            wholeChip +
            lobChips +
            "</div>"
          );
        }

        /* ---- the one live sentence, derived from ctx.computeRunSummary ---- */
        function buildSentence(r) {
          if (r.whole) {
            return (
              "Reprocess will re-run the entire submission — all " +
              r.total +
              " line" +
              (r.total === 1 ? "" : "s") +
              " — from " +
              r.includedDocs +
              " document" +
              (r.includedDocs === 1 ? "" : "s") +
              "."
            );
          }
          if (r.selectedCount === 0) {
            return 'Choose a line, or “Entire submission,” to see exactly what a reprocess will do.';
          }
          const selected = CTX.effectiveLobs(state.scope);
          const lockedCount = r.total - r.selectedCount;
          let s =
            "Reprocess will re-run " +
            r.selectedCount +
            " line" +
            (r.selectedCount === 1 ? "" : "s") +
            " (" +
            selected.map((l) => CTX.esc(l.label)).join(", ") +
            ") from " +
            r.includedDocs +
            " document" +
            (r.includedDocs === 1 ? "" : "s") +
            ".";
          if (lockedCount > 0) {
            s +=
              " " +
              lockedCount +
              " line" +
              (lockedCount === 1 ? "" : "s") +
              " stay" +
              (lockedCount === 1 ? "s" : "") +
              " locked.";
          }
          return s;
        }

        function sentenceHTML() {
          const r = CTX.computeRunSummary(state.scope);
          const set = CTX.hasSelection(state.scope);
          return (
            '<div class="sp-sentence-box' +
            (set ? " is-set" : "") +
            '"><p class="sp-sentence">' +
            buildSentence(r) +
            '</p><p class="sp-protect-line">🔒 ' +
            CTX.esc(CTX.data.protectedField) +
            " protected · no submission-level fields pushed</p></div>"
          );
        }

        function actionsHTML() {
          return (
            '<div class="sp-actions">' +
            '<button class="slds-btn slds-btn--brand" data-reprocess' +
            (CTX.hasSelection(state.scope) ? "" : " disabled") +
            ">Reprocess</button>" +
            '<button class="sp-secondary" data-processnew>Process as New</button>' +
            "</div>"
          );
        }

        function render() {
          badge();
          const mount = document.getElementById("cc-body");
          mount.innerHTML = "";
          const box = document.createElement("div");
          box.innerHTML =
            bannerHTML() + docsLineHTML() + scopeHTML() + sentenceHTML() + actionsHTML();
          mount.appendChild(box);
          bind(box);
        }

        function bind(box) {
          const dt = box.querySelector("[data-toggle-docs]");
          if (dt)
            dt.onclick = function () {
              state.docsOpen = !state.docsOpen;
              render();
            };

          box.querySelectorAll(".doc-toggle").forEach(function (b) {
            b.onclick = function () {
              const n = b.dataset.doc;
              state.scope.excludedDocs.has(n)
                ? state.scope.excludedDocs.delete(n)
                : state.scope.excludedDocs.add(n);
              render();
            };
          });

          const wb = box.querySelector("[data-whole]");
          if (wb)
            wb.onclick = function () {
              state.scope.whole = !state.scope.whole;
              render();
            };

          box.querySelectorAll("[data-lob]").forEach(function (b) {
            b.onclick = function () {
              state.scope.whole = false;
              const id = b.dataset.lob;
              state.scope.lob.has(id) ? state.scope.lob.delete(id) : state.scope.lob.add(id);
              render();
            };
          });

          const rp = box.querySelector("[data-reprocess]");
          if (rp)
            rp.onclick = async function () {
              const ok = await CTX.runReprocess(state.scope);
              if (ok) {
                state.scope = ASTRUS.newScope();
                render();
              }
            };

          const pn = box.querySelector("[data-processnew]");
          if (pn)
            pn.onclick = async function () {
              const ok = await CTX.confirmModal({
                title: "Process as a new submission?",
                body:
                  "<p>This ignores your scope and rebuilds <strong>everything</strong> as a fresh, potentially duplicate submission. Use it only for a genuinely new deal.</p>",
                confirmLabel: "Process as New",
                destructive: true
              });
              if (ok)
                CTX.toast(
                  "success",
                  "Process as New initiated",
                  "A new submission has been sent to the AI engine."
                );
            };
        }

        window.CONCEPT = {
          name: "Smart Panel",
          render: function (mount, ctx) {
            CTX = ctx;
            state.scope = CTX.newScope();
            render();
          }
        };
        ASTRUS.boot(window.CONCEPT);
      })();
    </script>
  </body>
</html>
